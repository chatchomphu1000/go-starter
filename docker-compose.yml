services:
  app:
    build:
      context: .
      args:
        VERSION: ${APP_APP_VERSION:-dev}
    env_file:
      - path: .env
        required: false
    environment:
      # Override only what differs inside Docker (service name vs localhost)
      APP_MONGO_URI: mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mongo_data:

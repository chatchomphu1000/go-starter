basePath: /
definitions:
  dto.BookingListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.BookingResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.BookingResponse:
    properties:
      created_at:
        type: string
      deposit:
        type: number
      end_date:
        type: string
      id:
        type: string
      monthly_rent:
        type: number
      notes:
        type: string
      owner_id:
        type: string
      rejection_reason:
        type: string
      room_id:
        type: string
      start_date:
        type: string
      status:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  dto.CreateBookingRequest:
    properties:
      end_date:
        description: YYYY-MM-DD
        type: string
      notes:
        maxLength: 500
        type: string
      room_id:
        type: string
      start_date:
        description: YYYY-MM-DD
        type: string
    required:
    - end_date
    - room_id
    - start_date
    type: object
  dto.CreateInvoiceRequest:
    properties:
      booking_id:
        type: string
      due_date:
        description: YYYY-MM-DD
        type: string
      items:
        items:
          $ref: '#/definitions/dto.InvoiceItemRequest'
        minItems: 1
        type: array
      month:
        maximum: 12
        minimum: 1
        type: integer
      notes:
        maxLength: 500
        type: string
      tenant_id:
        type: string
      year:
        minimum: 2020
        type: integer
    required:
    - booking_id
    - due_date
    - items
    - month
    - tenant_id
    - year
    type: object
  dto.CreateNoticeRequest:
    properties:
      content:
        maxLength: 5000
        minLength: 5
        type: string
      expires_at:
        description: YYYY-MM-DD optional
        type: string
      pinned:
        type: boolean
      title:
        maxLength: 200
        minLength: 3
        type: string
      type:
        enum:
        - general
        - payment
        - maintenance
        - emergency
        - event
        type: string
    required:
    - content
    - title
    - type
    type: object
  dto.CreatePaymentRequest:
    properties:
      amount:
        type: number
      booking_id:
        type: string
      currency:
        type: string
      description:
        maxLength: 500
        type: string
      gateway:
        enum:
        - stripe
        - omise
        - paypal
        - manual
        type: string
      invoice_id:
        type: string
      method:
        enum:
        - credit_card
        - bank_transfer
        - cash
        - qr_code
        type: string
    required:
    - amount
    - booking_id
    - currency
    - method
    type: object
  dto.CreateRoomRequest:
    properties:
      amenities:
        items:
          type: string
        type: array
      deposit:
        minimum: 0
        type: number
      description:
        maxLength: 2000
        type: string
      floor:
        maximum: 200
        minimum: 0
        type: integer
      name:
        maxLength: 100
        minLength: 1
        type: string
      number:
        maxLength: 20
        minLength: 1
        type: string
      photos:
        items:
          type: string
        type: array
      rent_price:
        minimum: 0
        type: number
      size_sqm:
        minimum: 0
        type: number
      type:
        enum:
        - studio
        - 1br
        - 2br
        - suite
        - loft
        type: string
    required:
    - name
    - number
    - rent_price
    - type
    type: object
  dto.CreateTicketRequest:
    properties:
      category:
        enum:
        - plumbing
        - electrical
        - ac
        - furniture
        - other
        type: string
      description:
        maxLength: 2000
        minLength: 5
        type: string
      owner_id:
        type: string
      photos:
        items:
          type: string
        type: array
      priority:
        enum:
        - low
        - medium
        - high
        - urgent
        type: string
      room_id:
        type: string
      title:
        maxLength: 200
        minLength: 3
        type: string
    required:
    - category
    - description
    - owner_id
    - priority
    - room_id
    - title
    type: object
  dto.ErrorResponse:
    properties:
      code:
        type: string
      details:
        items:
          type: string
        type: array
      message:
        type: string
      request_id:
        type: string
    type: object
  dto.InvoiceItemRequest:
    properties:
      description:
        type: string
      quantity:
        minimum: 1
        type: integer
      unit_price:
        minimum: 0
        type: number
    required:
    - description
    - quantity
    - unit_price
    type: object
  dto.InvoiceItemResponse:
    properties:
      description:
        type: string
      quantity:
        type: integer
      total:
        type: number
      unit_price:
        type: number
    type: object
  dto.InvoiceListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.InvoiceResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.InvoiceResponse:
    properties:
      booking_id:
        type: string
      created_at:
        type: string
      due_date:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/dto.InvoiceItemResponse'
        type: array
      month:
        type: integer
      notes:
        type: string
      owner_id:
        type: string
      paid_at:
        type: string
      status:
        type: string
      tenant_id:
        type: string
      total_amount:
        type: number
      updated_at:
        type: string
      year:
        type: integer
    type: object
  dto.ListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      refresh_expires_at:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  dto.MessageListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.MessageResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.MessageResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      read:
        type: boolean
      receiver_id:
        type: string
      sender_id:
        type: string
      thread_id:
        type: string
    type: object
  dto.NoticeListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.NoticeResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.NoticeResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      owner_id:
        type: string
      pinned:
        type: boolean
      title:
        type: string
      type:
        type: string
      updated_at:
        type: string
    type: object
  dto.PaymentListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.PaymentResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.PaymentResponse:
    properties:
      amount:
        type: number
      booking_id:
        type: string
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      gateway:
        type: string
      gateway_tx_id:
        type: string
      id:
        type: string
      invoice_id:
        type: string
      method:
        type: string
      owner_id:
        type: string
      paid_at:
        type: string
      status:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RegisterRequest:
    properties:
      email:
        maxLength: 254
        type: string
      name:
        maxLength: 80
        minLength: 2
        type: string
      password:
        maxLength: 128
        minLength: 10
        type: string
    required:
    - email
    - name
    - password
    type: object
  dto.RejectBookingRequest:
    properties:
      reason:
        maxLength: 500
        type: string
    required:
    - reason
    type: object
  dto.ResolveTicketRequest:
    properties:
      notes:
        maxLength: 2000
        type: string
    type: object
  dto.RoomListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.RoomResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.RoomResponse:
    properties:
      amenities:
        items:
          type: string
        type: array
      created_at:
        type: string
      deposit:
        type: number
      description:
        type: string
      floor:
        type: integer
      id:
        type: string
      name:
        type: string
      number:
        type: string
      owner_id:
        type: string
      photos:
        items:
          type: string
        type: array
      rent_price:
        type: number
      size_sqm:
        type: number
      status:
        type: string
      type:
        type: string
      updated_at:
        type: string
    type: object
  dto.SendMessageRequest:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
      receiver_id:
        type: string
    required:
    - content
    - receiver_id
    type: object
  dto.ThreadListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ThreadResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.ThreadResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      last_at:
        type: string
      last_message:
        type: string
      participants:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  dto.TicketListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.TicketResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.TicketResponse:
    properties:
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      notes:
        type: string
      owner_id:
        type: string
      photos:
        items:
          type: string
        type: array
      priority:
        type: string
      resolved_at:
        type: string
      room_id:
        type: string
      status:
        type: string
      tenant_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.UpdateNoticeRequest:
    properties:
      content:
        maxLength: 5000
        minLength: 5
        type: string
      expires_at:
        description: YYYY-MM-DD or null to clear
        type: string
      pinned:
        type: boolean
      title:
        maxLength: 200
        minLength: 3
        type: string
      type:
        enum:
        - general
        - payment
        - maintenance
        - emergency
        - event
        type: string
    type: object
  dto.UpdateRequest:
    properties:
      name:
        maxLength: 80
        minLength: 2
        type: string
    type: object
  dto.UpdateRoomRequest:
    properties:
      amenities:
        items:
          type: string
        type: array
      deposit:
        minimum: 0
        type: number
      description:
        maxLength: 2000
        type: string
      floor:
        maximum: 200
        minimum: 0
        type: integer
      name:
        maxLength: 100
        minLength: 1
        type: string
      photos:
        items:
          type: string
        type: array
      rent_price:
        minimum: 0
        type: number
      size_sqm:
        minimum: 0
        type: number
      status:
        enum:
        - available
        - occupied
        - maintenance
        type: string
      type:
        enum:
        - studio
        - 1br
        - 2br
        - suite
        - loft
        type: string
    type: object
  dto.UserResponse:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  handler.buildInfo:
    properties:
      build_time:
        type: string
      commit:
        type: string
      version:
        type: string
    type: object
  inbound.IncomeExpenseReport:
    properties:
      invoiceCount:
        format: int64
        type: integer
      month:
        type: integer
      outstanding:
        format: float64
        type: number
      ownerID:
        type: string
      paymentCount:
        format: int64
        type: integer
      totalIncome:
        format: float64
        type: number
      totalInvoiced:
        format: float64
        type: number
      year:
        type: integer
    type: object
  inbound.OwnerDashboard:
    properties:
      activeBookings:
        format: int64
        type: integer
      availableRooms:
        format: int64
        type: integer
      maintenanceRooms:
        format: int64
        type: integer
      monthlyRevenue:
        format: float64
        type: number
      occupiedRooms:
        format: int64
        type: integer
      overdueInvoices:
        format: int64
        type: integer
      ownerID:
        type: string
      pendingBookings:
        format: int64
        type: integer
      pendingMaintenance:
        format: int64
        type: integer
      totalRooms:
        format: int64
        type: integer
      unreadMessages:
        format: int64
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
  description: Production-ready Go REST API starter with hexagonal architecture.
  title: Go Starter API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT token
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refreshes an access token using a valid refresh token
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Refresh JWT token
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account
      parameters:
      - description: Registration data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /api/v1/bookings:
    get:
      parameters:
      - description: Filter by owner
        in: query
        name: owner_id
        type: string
      - description: Filter by tenant
        in: query
        name: tenant_id
        type: string
      - description: Filter by room
        in: query
        name: room_id
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BookingListResponse'
      security:
      - BearerAuth: []
      summary: List bookings
      tags:
      - bookings
    post:
      consumes:
      - application/json
      parameters:
      - description: Booking data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.BookingResponse'
      security:
      - BearerAuth: []
      summary: Create a booking
      tags:
      - bookings
  /api/v1/bookings/{id}:
    get:
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BookingResponse'
      security:
      - BearerAuth: []
      summary: Get booking by ID
      tags:
      - bookings
  /api/v1/bookings/{id}/activate:
    post:
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BookingResponse'
      security:
      - BearerAuth: []
      summary: Activate a booking (tenant moved in)
      tags:
      - bookings
  /api/v1/bookings/{id}/approve:
    post:
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BookingResponse'
      security:
      - BearerAuth: []
      summary: Approve a booking
      tags:
      - bookings
  /api/v1/bookings/{id}/cancel:
    post:
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BookingResponse'
      security:
      - BearerAuth: []
      summary: Cancel a booking
      tags:
      - bookings
  /api/v1/bookings/{id}/complete:
    post:
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BookingResponse'
      security:
      - BearerAuth: []
      summary: Complete a booking (tenant moved out)
      tags:
      - bookings
  /api/v1/bookings/{id}/reject:
    post:
      consumes:
      - application/json
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: string
      - description: Rejection reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RejectBookingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BookingResponse'
      security:
      - BearerAuth: []
      summary: Reject a booking
      tags:
      - bookings
  /api/v1/invoices:
    get:
      parameters:
      - description: Filter by booking
        in: query
        name: booking_id
        type: string
      - description: Filter by tenant
        in: query
        name: tenant_id
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by month (1-12)
        in: query
        name: month
        type: integer
      - description: Filter by year
        in: query
        name: year
        type: integer
      - description: Page
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.InvoiceListResponse'
      security:
      - BearerAuth: []
      summary: List invoices
      tags:
      - invoices
    post:
      consumes:
      - application/json
      parameters:
      - description: Invoice data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateInvoiceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.InvoiceResponse'
      security:
      - BearerAuth: []
      summary: Create an invoice
      tags:
      - invoices
  /api/v1/invoices/{id}:
    get:
      parameters:
      - description: Invoice ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.InvoiceResponse'
      security:
      - BearerAuth: []
      summary: Get invoice by ID
      tags:
      - invoices
  /api/v1/invoices/{id}/cancel:
    post:
      parameters:
      - description: Invoice ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.InvoiceResponse'
      security:
      - BearerAuth: []
      summary: Cancel an invoice
      tags:
      - invoices
  /api/v1/invoices/{id}/download:
    get:
      parameters:
      - description: Invoice ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Download invoice as HTML (print-ready)
      tags:
      - invoices
  /api/v1/invoices/{id}/pay:
    post:
      parameters:
      - description: Invoice ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.InvoiceResponse'
      security:
